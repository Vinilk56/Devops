name: Check Azure Connectivity

on:
  workflow_dispatch:   # Allows you to trigger manually from GitHub UI

jobs:
  connectivity-test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Log in to Azure
        uses: azure/login@v1
        with:
          creds: ${{ secrets.azureauth }}

      - name: Verify Azure subscription
        run: |
          echo "Checking Azure connectivity..."
          az account show
